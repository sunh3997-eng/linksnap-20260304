<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkSnap</title>
<style>
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --accent:  #6c8fff;
    --accent2: #a78bfa;
    --text:    #e2e8f0;
    --muted:   #8892a4;
    --danger:  #f87171;
    --success: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
  }

  header {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .open-dashboard {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    background: none;
  }
  .open-dashboard:hover { border-color: var(--accent); color: var(--accent); }

  .body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

  .page-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .page-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .page-url   { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .save-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    margin-top: 2px;
  }
  .save-btn:hover:not(:disabled) { opacity: .85; }
  .save-btn:disabled { opacity: .5; cursor: default; }

  .status {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
  }
  .status.success { background: rgba(74, 222, 128, .1); border: 1px solid rgba(74,222,128,.3); color: var(--success); display: flex; }
  .status.error   { background: rgba(248, 113, 113, .1); border: 1px solid rgba(248,113,113,.3); color: var(--danger); display: flex; }
  .status.loading { background: var(--surface); border: 1px solid var(--border); color: var(--muted); display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .settings-link {
    text-align: center;
    padding: 10px 16px 14px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
  .settings-link a { color: var(--accent); text-decoration: none; }
  .settings-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <span class="logo">🔗 LinkSnap</span>
  <button class="open-dashboard" id="open-dashboard">打开库</button>
</header>

<div class="body">
  <div class="page-info">
    <div class="page-title" id="page-title">加载中…</div>
    <div class="page-url"   id="page-url"></div>
  </div>

  <div>
    <label for="tags-input">标签（英文逗号分隔，可留空）</label>
    <input type="text" id="tags-input" placeholder="例：tech, ai, design">
  </div>

  <button class="save-btn" id="save-btn">⚡ 保存 &amp; 生成摘要</button>

  <div class="status" id="status-box">
    <div class="spinner" id="spinner" style="display:none"></div>
    <span id="status-text"></span>
  </div>
</div>

<div class="settings-link">
  <a href="#" id="settings-link">⚙ 设置后端地址</a>
</div>

<script src="popup.js"></script>
</body>
</html>
