<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>LinkSnap</title>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --surface2: #21262d;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --accent:   #3b82f6;
    --success:  #22c55e;
    --danger:   #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    max-height: 520px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .header-right { margin-left: auto; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.12s, background 0.12s;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }

  /* ── Settings panel ── */
  .settings-panel {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .settings-panel.open { display: flex; }

  .field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field-row label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.12s;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }
  select.field-input { cursor: pointer; }

  .input-row {
    display: flex;
    gap: 6px;
  }
  .input-row .field-input { flex: 1; }

  .settings-actions {
    display: flex;
    gap: 8px;
  }

  .s-status {
    font-size: 12px;
    padding: 6px 9px;
    border-radius: 5px;
    display: none;
  }
  .s-status.ok  { display: block; color: var(--success); background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); }
  .s-status.err { display: block; color: var(--danger);  background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2); }
  .s-status.inf { display: block; color: var(--muted);   background: var(--bg);             border: 1px solid var(--border); }

  /* ── Buttons ── */
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s, opacity 0.12s;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled)   { background: #2563eb; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--border); }
  .btn-block { width: 100%; }

  /* ── Save section ── */
  .save-section {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .page-card {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    min-width: 0;
  }
  .page-favicon {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
    object-fit: contain;
  }
  .page-meta { min-width: 0; flex: 1; }
  .page-title {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .page-url {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  /* ── Search ── */
  .search-wrap {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-input {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 4px 0;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.12s;
  }
  .search-input:focus { border-bottom-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* ── Link list ── */
  .link-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .link-list::-webkit-scrollbar { width: 3px; }
  .link-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    padding: 28px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    display: none;
  }
  .empty-state.visible { display: block; }

  .link-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    transition: background 0.1s;
  }
  .link-item:hover { background: var(--surface); }
  .link-item:last-child { border-bottom: none; }

  .link-favicon {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    margin-top: 2px;
    flex-shrink: 0;
    object-fit: contain;
  }

  .link-body { flex: 1; min-width: 0; }

  .link-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    text-decoration: none;
    display: block;
    margin-bottom: 2px;
  }
  .link-title:hover { color: var(--accent); }

  .link-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 3px;
  }

  .link-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .link-model {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
  }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 15px;
    line-height: 1;
    padding: 1px 4px;
    border-radius: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.1s, color 0.1s;
  }
  .link-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--danger); }

  /* ── Footer ── */
  .footer {
    padding: 7px 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .footer-sep { opacity: 0.4; }

  /* ── Pulse dots ── */
  .pulse {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    vertical-align: middle;
  }
  .pulse span {
    width: 4px;
    height: 4px;
    background: currentColor;
    border-radius: 50%;
    animation: pulse 1.1s ease-in-out infinite;
    opacity: 0.4;
  }
  .pulse span:nth-child(2) { animation-delay: 0.18s; }
  .pulse span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.25; }
    40%           { opacity: 1; }
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    max-width: 340px;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transition: opacity 0.18s, transform 0.18s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { color: var(--success); border-color: rgba(34,197,94,0.3); }
  .toast.error   { color: var(--danger);  border-color: rgba(239,68,68,0.3); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo">LinkSnap</span>
  <div class="header-right">
    <button class="icon-btn" id="settings-toggle" title="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<!-- Settings panel (collapsed by default) -->
<div class="settings-panel" id="settings-panel">
  <div class="field-row">
    <label for="s-provider">Provider</label>
    <select class="field-input" id="s-provider">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="openrouter">OpenRouter</option>
      <option value="groq">Groq</option>
      <option value="ollama">Ollama (local)</option>
      <option value="custom">Custom</option>
    </select>
  </div>

  <div class="field-row" id="s-key-row">
    <label for="s-api-key">API Key</label>
    <div class="input-row">
      <input type="password" class="field-input" id="s-api-key" placeholder="sk-...">
      <button class="icon-btn" id="s-eye-btn" title="Show / hide key">
        <!-- eye-open: shown when key is hidden (click to reveal) -->
        <svg id="s-eye-show" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <!-- eye-off: shown when key is visible (click to hide) -->
        <svg id="s-eye-hide" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden aria-hidden="true">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="field-row" id="s-endpoint-row" hidden>
    <label for="s-endpoint">Endpoint URL</label>
    <input type="text" class="field-input" id="s-endpoint" placeholder="http://localhost:8080/v1">
  </div>

  <div class="field-row" id="s-model-row">
    <label for="s-model">Model</label>
    <select class="field-input" id="s-model"></select>
  </div>

  <div class="field-row" id="s-ollama-model-row" hidden>
    <label for="s-ollama-model">Ollama model override</label>
    <input type="text" class="field-input" id="s-ollama-model" placeholder="llama3.2">
  </div>

  <div class="field-row" id="s-custom-model-row" hidden>
    <label for="s-custom-model">Model name</label>
    <input type="text" class="field-input" id="s-custom-model" placeholder="gpt-4o-mini">
  </div>

  <div class="settings-actions">
    <button class="btn btn-primary" id="s-save-btn">Save</button>
    <button class="btn btn-secondary" id="s-test-btn">Test connection</button>
  </div>

  <div class="s-status" id="s-status"></div>
</div>

<!-- Save section -->
<div class="save-section">
  <div class="page-card">
    <img class="page-favicon" id="page-favicon" src="" alt="">
    <div class="page-meta">
      <div class="page-title" id="page-title">Loading...</div>
      <div class="page-url" id="page-url"></div>
    </div>
  </div>
  <button class="btn btn-primary btn-block" id="save-btn">Save &amp; Summarize</button>
</div>

<!-- Search -->
<div class="search-wrap">
  <input type="text" class="search-input" id="search-input" placeholder="Search...">
</div>

<!-- Link list -->
<div class="link-list" id="link-list">
  <div class="empty-state" id="empty-state">No saved links yet.</div>
</div>

<!-- Footer -->
<div class="footer">
  <span id="stat-count">0 links</span>
  <span class="footer-sep">·</span>
  <span id="stat-model">—</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script src="popup.js"></script>
</body>
</html>
